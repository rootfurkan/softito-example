<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div id="box" class="bg-white p-8 rounded-xl shadow text-center transition-colors duration-300">
        <h1 class="text-4xl font-bold text-red-400 my-4 mb-2">Canlı Sayaç</h1>
        <div id="number" class="text-4xl text-blue-300 my-4">0</div>
        <div class="flex gap-4 justify-center">
            <button onclick="change(-1)" class="bg-red-500 text-white px-4 rounded font bold">-</button>
            <button onclick="change(1)" class="bg-green-500 text-white px-4 rounded font bold">+</button>
        </div>
    </div>
    <script>
        let count = 0;
        const box = document.getElementById('box');
        const number = document.getElementById('number');

        const greenShades = [
            "bg-green-100", "bg-green-200", "bg-green-300",
            "bg-green-400", "bg-green-500", "bg-green-600",
            "bg-green-700", "bg-green-800", "bg-green-900"
        ];
        const redShades = [
            "bg-red-100", "bg-red-200", "bg-red-300",
            "bg-red-400", "bg-red-500", "bg-red-600",
            "bg-red-700", "bg-red-800", "bg-red-900"
        ];

        let greenLevel = 0;
        let redLevel = 0;
        let base = "p-8 rounded-xl shadow text-center transition-colors duration-300";

        function change(e) {
            count += e;
            number.textContent = count;

            if (count > 0) {
                greenLevel = Math.min(greenLevel + 1, greenShades.length - 1);
                box.className = greenShades[greenLevel - 1] + " " + base;
            } else if (count < 0) {
                redLevel = Math.min(redLevel + 1, redShades.length - 1);
                box.className = redShades[redLevel - 1] + " " + base;
            } else {
                greenLevel = 0;
                redLevel = 0;
                box.className = "bg-white " + base;
            }
        }
    </script>
</body>
</html>

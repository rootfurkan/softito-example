<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobilde Alt Alta - 4 Yöntem (Tailwind)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8 flex flex-col items-center gap-8">

    <!-- 1. yöntem flex-col md:flex-row -->
    <div class="max-w-xl w-full bg-white p-6 rounded shadow">
        <h2 class="text-lg font-bold mb-1">Yöntem 1: Flexbox — flex-col / md:flex-row</h2>

        <div class="flex flex-col md:flex-row gap-4 bg-slate-100 p-3 border rounded">
            <div class="bg-blue-500 text-white p-3 rounded">Kutu 1</div>
            <div class="bg-red-500 text-white p-3 rounded">Kutu 2</div>
            <div class="bg-yellow-500 text-white p-3 rounded">Kutu 3</div>
        </div>
    </div>

    <!-- 2. yöntem grid-cols-1 / md:grid-cols-3 -->
    <div class="max-w-xl w-full bg-white p-6 rounded shadow">
        <h2 class="text-lg font-bold mb-1">Yöntem 2: Grid — grid-cols-1 / md:grid-cols-3</h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-100 p-3 border rounded">
            <div class="bg-blue-500 text-white p-3 rounded">Kutu 1</div>
            <div class="bg-red-500 text-white p-3 rounded">Kutu 2</div>
            <div class="bg-yellow-500 text-white p-3 rounded">Kutu 3</div>
        </div>
    </div>

    <!-- 3. yöntem flex-wrap + w-full / md:w-auto -->
    <div class="max-w-xl w-full bg-white p-6 rounded shadow">
        <h2 class="text-lg font-bold mb-1">Yöntem 3: Flex Wrap + w-full / md:w-auto</h2>

        <div class="flex flex-wrap gap-4 bg-slate-100 p-3 border rounded">
            <div class="w-full md:flex-1 bg-blue-500 text-white p-3 rounded">Kutu 1</div>
            <div class="w-full md:flex-1 bg-red-500 text-white p-3 rounded">Kutu 2</div>
            <div class="w-full md:flex-1 bg-yellow-500 text-white p-3 rounded">Kutu 3</div>
        </div>
    </div>

    <!-- 4. yöntem grid-flow-col + auto-cols-fr -->
    <div class="max-w-xl w-full bg-white p-6 rounded shadow">
        <h2 class="text-lg font-bold mb-1">Yöntem 4: Grid — grid-flow-col + auto-cols-fr</h2>

        <div class="grid grid-cols-1 md:grid-cols-none md:grid-flow-col md:auto-cols-fr gap-4 bg-slate-100 p-3 border rounded">
            <div class="bg-blue-500 text-white p-3 rounded">Kutu 1</div>
            <div class="bg-red-500 text-white p-3 rounded">Kutu 2</div>
            <div class="bg-yellow-500 text-white p-3 rounded">Kutu 3</div>
        </div>
    </div>

</body>
</html>

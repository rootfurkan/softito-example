<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8 flex justify-center">
    <div class="max-w-sm w-full bg-white p-5 rounded shadow">
        <h1 class="text-xl font-bold mb-5 text-slate-800">Giriş Yap</h1>
    <form class="space-y-4">
        <div>
            <label class="text-xs text-slate-600 mb-1 block">E-posta</label>
            <input class="w-full border p-2 rounded text-sm focus:outline-none focus:border-blue-500" type="email" placeholder="Eposta adresinizi giriniz">
        </div>
        <div>
            <label class="text-xs text-slate-600 mb-1 block">Şifre</label>
            <input class="w-full border p-2 rounded text-sm focus:outline-none focus:border-blue-500" type="password" placeholder="***********">
        </div>
        <button class="w-full bg-blue-500 text-white font-semibold py-2 rounded hover:bg-blue-600" type="submit">Gİriş Yap</button>
    </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeScript Generic Örneği</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.0.4/typescript.min.js"></script>
</head>

<body class="p-6 bg-gray-100">

    <div class="p-6 bg-white rounded shadow">
        <h1 class="text-xl font-bold mb-4">Genel (Generic) Fonksiyonlar</h1>

        <div class="space-y-2 mb-4">
            <button id="btn-numbers"
                class="p-2 bg-blue-500 text-white rounded">
                Sayı Dizisinden İlk Elemanı Çek
            </button>

            <button id="btn-strings"
                class="p-2 bg-green-500 text-white rounded">
                Metin Dizisinden İlk Elemanı Çek
            </button>
        </div>

        <div id="result" class="p-3 border rounded">
            Sonuç bekleniyor...
        </div>
    </div>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            document
                .querySelectorAll('script[type="text/typescript"]')
                .forEach(script => {
                    const js = window.ts.transpile(script.textContent);

                    const newScript = document.createElement("script");
                    newScript.textContent = js;

                    document.body.appendChild(newScript);
                });
        });
    </script>

    <script type="text/typescript">

        const out = document.getElementById("result") as HTMLDivElement;

        function ilkElemaniAl<T>(dizi: T[]): T {
            return dizi[0];
        }

        const sayilar: number[] = [100, 200, 300];
        const ogrenciler: string[] = ["Ali", "Veli", "Onur"];

        document.getElementById("btn-numbers")?.addEventListener("click", () => {
            const sonuc = ilkElemaniAl<number>(sayilar);

            out.innerText =
                "Sayı dizisinin ilk elemanı: " +
                sonuc +
                " (tip: " +
                typeof sonuc +
                ")";
        });

        document.getElementById("btn-strings")?.addEventListener("click", () => {
            const sonuc = ilkElemaniAl<string>(ogrenciler);

            out.innerText =
                "Metin dizisinin ilk elemanı: " +
                sonuc +
                " (tip: " +
                typeof sonuc +
                ")";
        });

    </script>

</body>
</html>

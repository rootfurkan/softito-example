<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.0.4/typescript.min.js"></script>
</head>
<body class="p-6 bg-gray-100">
    <div class="p-6 bg-white">
        <h1 class="text-xl">Arayüz (Interface) Yapısı</h1>
        <div class="mb-4">
            <input type="text" id="prod-name" placeholder="ürün adı" class="p-1 border">
             <input type="number" id="prod-price" placeholder="ürün fiyatı" class="p-1 border">
        </div>
        <button id="btn-add" class="p-2 bg-blue-200">Ürün Ekle</button>
        <ul class="list-disc pl-5 space-y-2" id="product-list"></ul>
    </div>  


    <script>
        window.addEventListener('DOMContentLoaded', ()=>{
            document.querySelectorAll('script[type="text/typescript"]').forEach(script=>{
                const js = window.ts.transpile(script.textContent);
                const newScript = document.createElement('script');
                newScript.textContent = js;
                document.body.appendChild(newScript);
            })
        })
    </script>
    <script type="text/typescript">
        interface Urun {
            id : number;
            ad: string;
            fiyat: number;
        }
        const urunler : Urun[] = [
        {id:1, ad:'Laptop', fiyat: 5000},
        {id:2, ad:'Telefon', fiyat: 3000}
        {id:3, ad:'Tablet', fiyat: 2000}
        ];

        const listElement = document.getElementById('product-list') as HTMLUListElement;
        const listeyiCiz = ()=>{
            listElement.innerHTML = '';
            urunler.forEach(u=>{
                const li = document.createElement('li');
                li.innerText = u.ad + " " + "Fiyat:" + " " + u.fiyat + "TL (Urun Kodu: " + u.id + ")";
                listElement.appendChild(li);
            }); 
        }
        listeyiCiz();

        document.getElementById('btn-add').addEventListener('click', ()=>{
            const ad = (document.getElementById('prod-name') as HTMLInputElement).value;
            const fiyat = Number((document.getElementById('prod-price') as HTMLInputElement).value);
            
            if (ad && !isNaN(fiyat)){
                const yeniUrun : Urun = {
                    id: urunler.length + 1,
                    ad: ad,
                    fiyat: fiyat
                }
                urunler.push(yeniUrun);
                listeyiCiz();
                ad.value = '';
                fiyat.value = '';
            }
        })

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body><center>
    <div>
        <h1>map() ve filter() Dizi Methodları</h1>
    </div>
    <br>
    <div>
        <label for="">Ürün Arama</label>
        <input type="text" id="input-search">
    </div>
    <br>
    <div>
        <label for="">Maksimum Fiyat</label>
        <input type="number" id="input-price-limit" value="50000">
    </div>
    <br>
    <div>
        <button id="btn-filter">Filtrele</button>
    </div>
    <div>
        <h3>Ürün Listesi</h3>
        <div id="products-list"></div>
    </div>
    </center>

    <script>
        const products = [
            {
                id: 1,
                ad: 'Iphone 17 Pro Max',
                fiyat: 110000
            },
            {
                id: 2,
                ad: 'Iphone 16 Pro Max',
                fiyat: 90000
            },
            {
                id: 3,
                ad: 'Iphone 15 Pro Max',
                fiyat: 70000
            },
            {
                id: 4,
                ad: 'Iphone 14 Pro Max',
                fiyat: 50000
            },
            {
                id: 5,
                ad: 'Iphone 13 Pro Max',
                fiyat: 35000
            },
        ]
        const listele = ()=>{
            const arama = document.getElementById('input-search').value.toLowerCase();
            const limit = parseFloat = document.getElementById('input-price-limit').value || 999999;
            const filtrelenmis = products.filter(product =>{
                return product.ad.toLowerCase().includes(arama) && product.fiyat <= limit;
            })

            const kartlarHTML = filtrelenmis.map(product=> `
            <div>
                <span>${product.ad}</span> 
                <span>${product.fiyat}</span> 
            </div>
            `).join('');

            document.getElementById('products-list').innerHTML = kartlarHTML || `<div></div>`;

        };
        document.getElementById('btn-filter').addEventListener('click', listele);
        listele();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spread Operator</title>
</head>
<body>
    <div>
        <h1>Spread Operator (dağıtma)</h1>
    </div>
    <br>
    <div>
        <h3>
            Dizi kopyalama ve referans
        </h3>
        <br>
        <div>
            <button id="btn-copy-ref">referans kopyalama (orji etkiler)</button>
            <button id="btn-copy-spread">spread kopyalama (güvenli)</button>
        </div>
    </div>
    <br><br>
    <div>
        <span>Orj Dizi</span>
        <div id="orig-arr">[]</div>
    </div>
    <br>
    <div>
        <span>Kopya Dizi</span>
        <div id="copy-arr">[]</div>
    </div>
    <div>
        <h3> 2. Nesne birleştirme</h3>
        <button id="btn-merge-obj">nesneleri birleştir</button>
        <div id="merge-result">
            nesne birleştirilmedi
        </div>
    </div>

    <script>
        let orijinal = [
            'apple', 'Microsoft'
        ]
        document.getElementById('orig-arr').innerText = JSON.stringify(orijinal);
        document.getElementById('btn-copy-ref').addEventListener('click', ()=>{
            orijinal = ['Apple', 'Microsoft'];
            const kopya = orijinal;
            kopya.push('Nokia');
            document.getElementById('orig-arr').innerText = JSON.stringify(orijinal);
            document.getElementById('copy-arr').innerText = JSON.stringify(kopya);
        });

        document.getElementById('btn-copy-spread').addEventListener('click', ()=>{
            orijinal = ['Elma', 'Armut'];
            const kopya = [...orijinal];
            kopya.push('kiraz');
            document.getElementById('orig-arr').innerText = JSON.stringify(orijinal);
            document.getElementById('copy-arr').innerText = JSON.stringify(kopya);
        });
        document.getElementById('btn-merge-obj').addEventListener('click', ()=>{
            const varsayilan = {tema: 'Koyu', dil: 'tr'};
            const kullanici = {dil:'en'};
            const sonNesne = {...varsayilan, ...kullanici};
            document.getElementById('merge-result').innerHTML = `<div>Oluşan Nesne ${JSON.stringify(sonNesne)} </div>`
        })
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let Const Farkı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"/>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen p-6 flex flex-col items-center jusify-center">
    <div>
        <div>
            <h1 class="text-bold text-2xl mb-5">Let ve Const Kullanımı</h1>
            <p></p>
        </div>
        <div>
            <div>
                <h3 class="text-bold text-xl">1. Let değişimi</h3>
                <div>
                    <button id="btn-let-score">Skoru Arttır</button>
                    <button id="btn-let-scope">Blok Kapsam Göster</button>
                </div>
                <div id="let-result">
                    Skor : başlatılmadı.
                </div>
            </div>
        </div>
        <br><br>

        <div>
            <h3 class="text-bold text-xl">2. Const Atama Yapma Hatası</h3>
                <button id="btn-const-reassign">hata yap</button>
                <div id="const-result">
                    Durum : işlem yapılmadı
                </div>
        </div>
        <br><br>
        <div>
            <h3 class="text-bold text-xl">3. Const'un İçine Eleman Ekleme</h3>
            <button id="btn-const-push">Eleman Ekle</button>
            <div id="array-result">
                Dizi : []
            </div>
        </div>
    </div>

    <script>
        let skor = 10;
        document.getElementById('btn-let-score').addEventListener('click', ()=>{
            skor=skor + 5;
            document.getElementById('let-result').innerText = 'Let Skor: ' + skor
        } ) 

        document.getElementById('btn-let-scope').addEventListener('click', ()=>{
            let deger = 100;
            if(true){
                let deger = 500;
            }
            document.getElementById('let-result').innerText= "js den okunan let değeri : " + deger;
           })
        
        document.getElementById('btn-const-reassign').addEventListener('click', ()=>{
            try{
                 const limit = 100;
                 limit = 200;
            } catch(err){
                document.getElementById('const-result').innerText = 'Hata: ' + err.message;
            }
        })
        
        const hobiler = ['kodlama', 'yüzme'];
        document.getElementById('array-result').innerText = 'Dizi Başlangıcı : ' + JSON.stringify(hobiler);
        document.getElementById('btn-const-push').addEventListener('click', ()=>{
            hobiler[2] = 'grafik'
            document.getElementById('array-result').innerText = 'Guncel Dizi Elemanları: ' +JSON.stringify(hobiler);
        })
    </script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiyatlandırma Kartı Flex Column</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
    />
  </head>
  <body class="bg-indigo-50 text-gray-800 font-sans min-h-screen p-8 flex flex-col items-center justify-center gap-6">
    <!-- bg-indigo-50: arka planı açık mor yapar, text-gray-800: yazıları koyu gri yapar, font-sans: yazı tipini sans-serif yapar, min-h-screen: yüksekliği ekran kadar yapar, p-8: her tarafa boşluk ekler, flex: flex düzeni açar, flex-col: elemanları üst üste sıralar, items-center: yatayda ortalar, justify-center: dikeyde ortalar, gap-6: elemanlar arası boşluk koyar -->

    <div class="text-center max-w-md">
      <!-- text-center: yazıyı ortalar, max-w-md: maksimum genişliği medium yapar -->

      <div>
        <h1 class="text-xl font-bold text-gray-900 mb-2">
          <!-- text-xl: yazı boyutunu büyük yapar, font-bold: yazıyı kalın yapar, text-gray-900: yazıyı çok koyu gri yapar, mb-2: altına boşluk ekler -->
          Fiyatlandırma Kartı Flex Column
        </h1>
        <p class="text-xs text-gray-500">
          <!-- text-xs: yazı boyutunu çok küçük yapar, text-gray-500: yazıyı orta gri yapar -->
          Kart elemanları üst üste sıralamak için flex-col, öne çıkan rozeti en
          üstte göstermek için ise order-first sınıfı kullanılır.
        </p>
      </div>

      <div class="w-full max-w-xs bg-white border border-gray-200 rounded-2xl p-6 flex flex-col gap-4 shadow-sm">
        <!-- w-full: genişliği yüzde yüz yapar, max-w-xs: maksimum genişliği küçük tutar, bg-white: arka planı beyaz yapar, border: çerçeve çizer, border-gray-200: çerçeveyi açık gri yapar, rounded-2xl: köşeleri çok yuvarlak yapar, p-6: içeriden boşluk ekler, flex: flex düzeni açar, flex-col: elemanları üst üste sıralar, gap-4: elemanlar arası boşluk koyar, shadow-sm: hafif gölge ekler -->

        <div>
          <h2 class="text-sm font-bold text-gray-800 uppercase tracking-wider">Standart Paket</h2>
          <!-- text-sm: yazı boyutunu small yapar, font-bold: yazıyı kalın yapar, text-gray-800: yazıyı koyu gri yapar, uppercase: tüm harfleri büyük yapar, tracking-wider: harfler arasını açar -->

          <p class="text-2xl font-extrabold text-gray-900 mt-1">99 TL / Ay</p>
          <!-- text-2xl: yazı boyutunu çok büyük yapar, font-extrabold: yazıyı çok kalın yapar, text-gray-900: yazıyı çok koyu gri yapar, mt-1: üstüne ufak boşluk ekler -->
        </div>

        <div class="order-first px-2.5 py-1 bg-indigo-100 border border-indigo-200 text-indigo-700 text-[9px] font-extrabold rounded-full self-start uppercase tracking-wider">
          <!-- order-first: bu elemanı en üste taşır, px-2.5: sağ ve soldan boşluk ekler, py-1: üst ve alttan boşluk ekler, bg-indigo-100: arka planı açık mor yapar, border: çerçeve çizer, border-indigo-200: çerçeveyi açık mor yapar, text-indigo-700: yazıyı koyu mor yapar, text-[9px]: yazı boyutunu 9px yapar, font-extrabold: yazıyı çok kalın yapar, rounded-full: köşeleri tam yuvarlak yapar, self-start: elemanı sola yaslar, uppercase: harfleri büyük yapar, tracking-wider: harfler arasını açar -->
          En Popüler Paketimiz
        </div>

        <div class="text-xs text-gray-500 space-y-2 border border-gray-100 pt-4">
          <!-- text-xs: yazı boyutunu çok küçük yapar, text-gray-500: yazıyı orta gri yapar, space-y-2: alt alta elemanlar arasına boşluk koyar, border: çerçeve çizer, border-gray-100: çerçeveyi çok açık gri yapar, pt-4: üstten boşluk ekler -->
          <p>1 Sınırsız Proje</p>
          <p>25 Tane Kişisel Proje</p>
          <p>Grup Çalışması</p>
        </div>

        <button class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-xs font-semibold transition-colors mt-2">Satın Al</button>
        <!-- w-full: butonu tam genişlik yapar, py-2: üst alttan boşluk ekler, bg-indigo-600: arka planı mor yapar, hover:bg-indigo-700: üzerine gelince daha koyu mor yapar, text-white: yazıyı beyaz yapar, rounded-lg: köşeleri yuvarlak yapar, text-xs: yazı boyutunu küçük yapar, font-semibold: yazıyı yarı kalın yapar, transition-colors: renk geçişini yumuşatır, mt-2: üstten boşluk ekler -->

      </div>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Await</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"/>
</head>
<body class="p-6 bg-gray-100">
    <div class="p-6 bg-white">
        <h1 class="text-xl font-bold">Async / Await</h1>
        <button id="btn-run" class="p-2 bg-pink-200">Siparişi Getir</button>
        <div id="result" class="mt-4 whitespace-pre-line">İşlem bekleniyor..</div>
    </div>  
    <script>
        const kullanciyiGetir = ()=>{
            return new Promise((resolve)=>{
                setTimeout(()=> resolve({id: 42, ad:'onur'}),1000)
            })
        }

        const sepetiGetir = (kullanici)=>{
            return new Promise ((resolve)=>{
                setTimeout(()=> resolve({sahip:kullanici.ad, urunler: ['cep telefonu', 'macbook']}),1000)
            })
        }
        const faturaHesapla = (sepet)=>{
            return new Promise ((resolve)=>{
                setTimeout(()=> resolve( `Müşteri: ${sepet.sahip}\n Ürünler: ${sepet.urunler.join(', ')}\nFatura Tutarı: 2500 TL `),1500);
            })
        }
        const siparisSureciniYonet = async()=>{
            const output = document.getElementById('result');
            output.innerText = 'Süreç Başlatıldı..'

            const kullanici = await kullanciyiGetir();
            output.innerText = `Kullanıcı Alındı: ${kullanici.ad}\n Sepet Yükleniyor..`

            const sepet = await sepetiGetir(kullanici);
            output.innerText = `sepet Alındı: ${sepet.urunler.join(', ')}\n Fatura Çıkarılıyor..`

            const fatura = await faturaHesapla(sepet);
            output.innerText = fatura;
        }
        document.getElementById('btn-run').addEventListener('click', siparisSureciniYonet)


    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch Get</title>
</head>
<body class="p-6 bg-gray-200">
    <div class="p-6 bg-white">
        <h1 class="text-xl">kullanıcı listesi fetch get</h1>
        <div class="mb-4">
            <input type="text" id="search-input" placeholder="isim ile ara.." class="p-2 border">
        </div>
        <button id="btn-load" class="p-2 bg-blue-200 mb-4">Listeyi Yükle</button>
        <ul id="user-list" class="list-disc pl-2 space-y-1">
            <li>henüz ali hocam yapamadı</li>
        </ul>
    </div>
    <script>
        let tumkullanicilar  = [];
        const yedekKullanicilar = [
            {'id':1 , 'name':'Ali Yılmaz', 'email': 'ali@gmail.com', 'sehir':'Çorum'},
            {'id':2 , 'name':'Ayşe Yılmaz', 'email': 'ayse@gmail.com', 'sehir':'kayseri'},
            {'id':3 , 'name':'Veli Yılmaz', 'email': 'veli@gmail.com', 'sehir':'istanbul'},
            {'id':4 , 'name':'Hatice Yılmaz', 'email': 'hatice@gmail.com', 'sehir':'tekirdağ'}
        ];
        const listeyiCiz = (kullanicilar)=>{
            const listElement = document.getElementById('user-list');
            listElement.innerHTML = '';

            if (kullanicilar.length === 0 ){
                listElement.innerHTML = '<li>Eşlenen kullanıcı bulunamadı </li>';
                return;
            }
            kullanicilar.forEach(user => {
                const li = document.createElement('li');
                li.innerHTML = `<strong> ${user.name}</strong> - Eposta: ${user.email} - (Şehir: ${user.sehir})`
                listElement.appendChild(li);
            });
        }

        const kullanicilariYukle = async()=>{
            const listElement = document.getElementById('user-list');
            listElement.innerHTML = '<li>Kullanıcılar Yükleniyor..</li>';

            try{
                const response  = await fetch('https://kodusta.com/api/kullanicilar.json');
                if (!response.ok){
                    throw new Error ('sunucu hatası' + response.status);
                }
                tumkullanicilar = await response.json();

            }catch(hata){
                console.warn('cors engeli veya bağlantı hatası, yedek veriler kullanılacak');
                tumkullanicilar.yedekKullanicilar;
            }
            listeyiCiz(tumkullanicilar);

        }
        document.getElementById('search-input').addEventListener('input', (e)=>{
            const aramaKelimesi = e.target.value.toLowerCase();
            const filtrelenmis = tumkullanicilar.filter(user=>user.name.toLowerCase().includes(aramaKelimesi));
            listeyiCiz(filtrelenmis);
        })
        document.getElementById('btn-load').addEventListener('click', kullanicilariYukle())

    </script>
</body>
</html>

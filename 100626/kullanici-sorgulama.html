<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kullanıcı Sorgulama</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"/>
</head>
<body class="p-6 bg-gray-300">
    <div class="p-6 bg-blue-200">
        <h3 class="text-xs font-semibold">Kullanıcı Sorgula</h3>
        <div class="mb-3">
            <input type="number" id="user-id" placeholder="kullanıdı ID Girin.." class="p-2 border ">
        </div>
        <button id="btn-search" class="p-2 bg-yellow-200">Kullanıcı Sorgula</button>
        <div id="result" class="mt-3 p-4">
            Sorgulama Yapılmadı..
        </div>
    </div>

    <script>
        const kullaniciSorgula = (id, onSuccess, onError) =>{
            setTimeout(()=>{
                const veriTabani = {
                    1:{isim : 'Ali', rol: 'Yapay Zeka Uzmanı'},
                    2:{isim: 'Onur', rol: 'IT Çalışanı'},
                    3:{isim: 'Ezgi', rol: 'Sınıf Başkanı'}

                }
                const kullanici = veriTabani[id];

                if (kullanici){
                    onSuccess(kullanici);
                }else{
                    onError('HATA! Girilen ID('+id +') veri tabanında bulunmadı!');
                }
            },1500)
        }

        document.getElementById('btn-search').addEventListener('click', ()=>{
            const output = document.getElementById('result');
            const inputId = document.getElementById('user-id').value;

            output.innerText = 'Sorgulanıyor..';
            output.className = 'mt-4 p-2';

            kullaniciSorgula(
                inputId,
                (kullanici) =>{
                    output.className = 'm-4 bg-green-200';
                    output.innerHTML = `<strong>Kullanıcı Bulundu!</strong> İsim: ${kullanici.isim} <br> Rol: ${kullanici.rol} `;
                },
                (hataMesaji)=>{
                    output.className = 'mt-4 bg-red-200';
                    output.innerHTML = hataMesaji;
                }
            )
        })
    </script>
</body>
</html>

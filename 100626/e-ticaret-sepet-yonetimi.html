<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axios</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.17.0/dist/axios.min.js"></script>
</head>
<body class="p-6 bg-gray-200">
    <div class="p-6 bg-white">
        <h1 class="text-xl font-bold">E-ticaret sepet yönetimi</h1>
        <div class="p-4 border">
            <h2 class="text-lg font-bold">
                Ürün katalog
            </h2>
            <div class="mb-2">

            <div class="mt-4 space-y-2" id="product-list">

            </div>
        </div>
        <div class="mt-2"></div>

                Toplam Tutar: <span id="cart-total">0</span>TL

            <button id="btn-checkout" class="p-2 bg-green-200 mt-2">Alışverişi Tamamla</button>
        </div>
        <div id="status" class="p-2 border">
            sistem hazır
        </div>
    </div>

            {"id":7,"title":"Spor Ayakkabı","kategori":"giyim","fiyat":"4200","stok":10}
        ]

        const urunleriSorgula = async()=>{

                const response  = await axios.get('https://kodusta.com/api/urunler.json');
                urunler=response.data

            filtrelenmis.forEach(urun => {

</body>
</html>

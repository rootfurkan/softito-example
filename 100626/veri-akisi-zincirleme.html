<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"/>
    <title>Veri Akışı ve Zincirleme</title>
</head>
<body class="p-6 bg-gray-100">
    <div class="p-6 bg-white">
        <h1 class="text-xl font-bold">Veri Akışı Zincirleme</h1>
        <button id="btn-start" class="bg-green-200">Siparişi Detaylandır</button>
        <div id="result" class="mt-4 whitespace-pre-line">İşlem başlatılmadı..</div>
    </div>
    <script>
        const kullaniciyiGetir = ()=>{
            return new Promise((resolve)=>{
                setTimeout(()=>{
                    resolve({id:42, ad: 'Onur', uyelik: 'Abdulbasit'})
                },2000)
            })
        }
        const sepetiGetir = (kullanici)=>{
            return new Promise((resolve)=>{
                setTimeout(()=>{
                    resolve({
                        sahip : kullanici.ad,
                        urunler : ['Akıllı Saat', 'Rimel', 'Tornavida']
                    })
                },1000)
            })
        }

        const faturaHesapla = (sepet)=>{
            return new Promise((resolve)=>{
                setTimeout(()=>{
                    resolve(`Müşteri:${sepet.sahip}\n Ürünler: ${sepet.urunler.join(', ')}Fatura tutarı 2350 TL (Kargo Bedava) `)
                },2000)
            })
        }
        document.getElementById('btn-start').addEventListener('click', ()=>{
            const output = document.getElementById('result');
            output.innerText = 'Müşteri Sorgulanıyor..';

            kullaniciyiGetir().then((kullanici)=>{
                output.innerText = `Müşteri Bulundu: ${kullanici.ad}\nSepet Aranıyor.. `;
                return sepetiGetir(kullanici);
            }).then((sepet)=>{
                output.innerText = `Sepet Alındı: ${sepet.urunler.join(', ')}\nFatura Hesaplanıyor..`;
                return faturaHesapla(sepet);
            }).then((faturaOzeti)=>{
                output.innerText = faturaOzeti;
            })
        })
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

    <title>Galeri</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"/>

<body class="bg-blue-50 text-gray-800  font-sans min-h-screen p-8 flex flex-col items-center justify-center gap-6">

    <div class="w-full max-w-4xl bg-white border border-gray-200 rounded-xl p-6 grid grid-cols-4 gap-4 shadow-sm">

            <div class="px-2 py-0.5 self-start bg-yellow-100 text-yellow-700 text-[8px] font-bold uppercase rounded">Açık Alan</div>
        </div>
        <div class="border border-gray-200 rounded-lg overflow-hidden bg-gray-50 flex flex-col gap-2 p-2 ">

            <div class="px-2 py-0.5 self-start bg-green-100 text-green-700 text-[8px] font-bold uppercase rounded">Açık Alan</div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sosyal Paylaşım Barları</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen p-8 flex flex-col items-center justify-center gap-6">
    <div class="text-center max-w-md">
        <h1 class="text-xl font-bold text-gray-900 mb-2">Sosyal Paylaşım Barları</h1>
        <p class="text-xs text-gray-500">Butonları Yatay Düzenleme Flex ve Flex-row İle</p>
    </div>
    <div class="w-full max-w-xl border border-gray-200 rounded-xl p-4 flex flex-wrap justify-between items-center gap-3 shadow-sm">
        <button class="flex-1 px-4 py-1 bg-pink-500 hover:bg-pink-300 border border-pink-300 rounded-lg text-sm font-semibold text-gray-100 transition-colors">Beğen</button>
        <button class="flex-1 px-4 py-1 bg-blue-500 hover:bg-blue-300 border border-blue-300 rounded-lg text-sm font-semibold text-gray-100 transition-colors">Yorum Yap</button>
        <button class="flex-1 px-4 py-1 bg-yellow-500 hover:bg-yellow-300 border border-yellow-300 rounded-lg text-sm font-semibold text-gray-100 transition-colors">Paylaş</button>
        <button class="px-4 py-1 bg-green-500 hover:bg-green-300 border border-green-300 rounded-lg text-sm font-semibold text-gray-100 transition-colors">Gönder</button>
    </div>
</body>
</html>
